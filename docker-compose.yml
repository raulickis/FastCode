# FastCode + Nanobot Docker Compose
# 飞书 <-> Nanobot <-> FastCode 全链路通信
#
# Usage:
#   docker compose up          # 前台启动
#   docker compose up -d       # 后台启动
#   docker compose logs -f     # 查看日志
#   docker compose down        # 停止服务

services:
  fastcode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastcode
    ports:
      - "8001:8001"
    volumes:
      # Configuration
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro

      # Persistent data (indexes, cache, repos, logs)
      - ./data:/app/data
      - ./repos:/app/repos
      - ./logs:/app/logs
      - ~/workspace/monitor:/app/repos-mon
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
    restart: unless-stopped

  nanobot:
    build:
      context: ./nanobot
      dockerfile: Dockerfile
    container_name: fastcode-nanobot
    command: ["gateway"]
    ports:
      - "18791:18790"
    volumes:
      # Nanobot configuration (飞书/Telegram token 等)
      - ./nanobot_config.json:/root/.nanobot/config.json:ro

      # Persistent workspace data
      - nanobot-workspace:/root/.nanobot/workspace
      - nanobot-sessions:/root/.nanobot/sessions

      # Shared: nanobot can access FastCode repos
      - ./repos:/app/repos:ro
    environment:
      - NANOBOT_ENV=docker
      # Internal API URL for nanobot -> FastCode communication
      - FASTCODE_API_URL=http://fastcode:8001
    depends_on:
      - fastcode
    restart: unless-stopped

  #---------------------------------------------------------------------
  # Banco de Dados Vetorial (Substituindo FAISS)
  #---------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # Porta REST (API)
      - "6334:6334" # Porta gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  #---------------------------------------------------------------------
  # Banco de Dados de Grafos (Preparacao para Gap 4)
  #---------------------------------------------------------------------
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  nanobot-workspace:
  nanobot-sessions:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
